name: Ubuntu Runtime

on:
  workflow_dispatch:

jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Detect runner public IP
        shell: bash
        run: |
          set -euo pipefail

          IP="$(curl -4 -fsSL https://api.ipify.org || true)"
          if [ -z "$IP" ]; then
            IP="unknown"
          fi

          printf '%s\n' "$IP" > ts-ip.txt
          echo "Runner public IP: $IP"

      - name: Upload IP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-ip
          path: ts-ip.txt
          if-no-files-found: error

      - name: Run installer
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail

          curl -fsSL https://sub-store.yfyf.fun/evan1s/api/file/evan1s_install.sh | bash -s -- \
            --install-dir "$HOME/dan-runtime" \
            --background \
            --cpa-base-url 'https://cpa.codex.surf/' \
            --cpa-token 'Xuyilin00..' \
            --mail-api-url 'http://140.245.126.24:9000/' \
            --mail-api-key 'linuxdo' \
            --threads 200

      - name: Show runtime directory
        shell: bash
        if: ${{ success() || failure() }}
        run: |
          ls -la "$HOME/dan-runtime" || true
          if [ -f "$HOME/dan-runtime/dan-web.log" ]; then
            echo "===== dan-web.log (latest 50 lines) ====="
            tail -n 50 "$HOME/dan-runtime/dan-web.log" || true
          else
            echo "dan-web.log not found yet"
          fi

      - name: Keep runner alive
        shell: bash
        if: ${{ success() || failure() }}
        run: |
          while true; do
            echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] ubuntu runner is alive"
            if [ -f "$HOME/dan-runtime/dan-web.log" ]; then
              echo "===== dan-web.log (latest 30 lines) ====="
              tail -n 30 "$HOME/dan-runtime/dan-web.log" || true
            else
              echo "dan-web.log not found yet"
            fi
            sleep 300
          done
